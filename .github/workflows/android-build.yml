name: Build Android APK

on:
  workflow_dispatch:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Verify project root
        run: |
          pwd
          ls -la
          test -f settings.gradle.kts
          test -f build.gradle.kts
          test -f gradlew
          test -f gradle/wrapper/gradle-wrapper.jar

      - name: Build debug APK
        run: ./gradlew --no-daemon --stacktrace :app:assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: StarlightExpedition-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload build reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: StarlightExpedition-failure-reports
          path: |
            **/build/reports/**
            **/build/outputs/logs/**
          if-no-files-found: ignore
          retention-days: 7
