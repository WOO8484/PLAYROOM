name: Build Android APK With Full Logs

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Prepare environment
        shell: bash
        run: |
          mkdir -p build-logs
          chmod +x gradlew
          {
            echo "=== DATE ==="
            date -u
            echo
            echo "=== ROOT ==="
            pwd
            ls -la
            echo
            echo "=== JAVA ==="
            java -version
          } > build-logs/environment.log 2>&1

      - name: Verify complete project structure
        id: structure_check
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python3 scripts/verify_project_structure.py \
            2>&1 | tee build-logs/project-structure.log
          exit "${PIPESTATUS[0]}"

      - name: Build debug APK
        id: gradle_build
        if: steps.structure_check.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          ./gradlew \
            --no-daemon \
            --stacktrace \
            --info \
            --warning-mode all \
            :app:assembleDebug \
            2>&1 | tee build-logs/assembleDebug-full.log
          exit "${PIPESTATUS[0]}"

      - name: Collect error summary and APK locations
        if: always()
        shell: bash
        run: |
          touch build-logs/assembleDebug-full.log
          {
            echo "=== STRUCTURE CHECK OUTCOME ==="
            echo "${{ steps.structure_check.outcome }}"
            echo
            echo "=== BUILD STEP OUTCOME ==="
            echo "${{ steps.gradle_build.outcome }}"
            echo
            echo "=== FIRST IMPORTANT ERRORS ==="
            grep -n -m 150 -E \
              '(^e: |FAILURE:|What went wrong:|Execution failed for task|Caused by:|Could not resolve|Could not find|Unresolved reference|error: |MISSING FILE|EMPTY FILE|MISSING MODULE|INVALID WRAPPER|NESTED PROJECT)' \
              build-logs/project-structure.log \
              build-logs/assembleDebug-full.log || true
            echo
            echo "=== LAST 400 BUILD LINES ==="
            tail -n 400 build-logs/assembleDebug-full.log || true
            echo
            echo "=== APK SEARCH ==="
            find . -type f -name "*.apk" -print || true
          } > build-logs/error-summary.log

          find . -type f -name "*.apk" -print > build-logs/apk-paths.log || true

      - name: Upload full build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: StarlightExpedition-full-build-logs
          path: build-logs/
          if-no-files-found: error
          retention-days: 30

      - name: Upload debug APK
        if: steps.structure_check.outcome == 'success' && steps.gradle_build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: StarlightExpedition-debug-apk
          path: |
            **/build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Mark workflow failed
        if: steps.structure_check.outcome != 'success' || steps.gradle_build.outcome != 'success'
        shell: bash
        run: |
          echo "Project verification or Gradle build failed."
          echo "Download: StarlightExpedition-full-build-logs"
          echo "Open error-summary.log first."
          exit 1
