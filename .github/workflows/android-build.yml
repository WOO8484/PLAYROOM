name: Android Build

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Grant execute permission to Gradle Wrapper
        run: chmod +x ./gradlew

      - name: Validate Gradle Wrapper files
        shell: bash
        run: |
          test -f gradlew
          test -f gradlew.bat
          test -f gradle/wrapper/gradle-wrapper.jar
          test -f gradle/wrapper/gradle-wrapper.properties

      - name: Clean, test, and build debug APK
        run: ./gradlew --stacktrace clean testDebugUnitTest assembleDebug

      - name: Collect build outputs
        if: always()
        shell: bash
        run: |
          mkdir -p github-artifacts/apk github-artifacts/reports github-artifacts/logs
          find app/build/outputs/apk/debug -type f -name "*.apk" -exec cp {} github-artifacts/apk/ \; 2>/dev/null || true
          find . -path "*/build/reports/*" -type f -exec cp --parents {} github-artifacts/reports/ \; 2>/dev/null || true
          find . -path "*/build/test-results/*" -type f -exec cp --parents {} github-artifacts/reports/ \; 2>/dev/null || true
          ./gradlew --version > github-artifacts/logs/gradle-version.txt 2>&1 || true

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PLAYROOM-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload test reports and build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: PLAYROOM-build-reports
          path: github-artifacts/
          if-no-files-found: warn
          retention-days: 14
